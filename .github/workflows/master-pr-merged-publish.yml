name: Master PR Merged Publish

on:
  pull_request:
    branches:
      - master
    types:
      - closed

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    name: Publish (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [win-x64, linux-x64, osx-x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/SABepInExManager/SABepInExManager.csproj

      - name: Prepare BepInEx core references for patcher build
        run: |
          cp -R ./third_party/BepInEx ./temp-bepinex

      - name: Build AutoUpdater patcher files
        run: dotnet build ./src/SABepInExManager.AutoUpdater/SABepInExManager.AutoUpdater.csproj -c Release /p:DebugType=None /p:DebugSymbols=false /p:BepInExDir="${{ github.workspace }}/temp-bepinex/BepInEx/core"

      - name: Stage patchers folder for publish
        run: |
          mkdir -p ./patchers/SABepInExManager_AutoUpdater
          cp -R ./src/SABepInExManager.AutoUpdater/bin/Release/net472/. ./patchers/SABepInExManager_AutoUpdater/

      - name: Publish
        run: dotnet publish ./src/SABepInExManager/SABepInExManager.csproj -c Release -r ${{ matrix.runtime }} --self-contained true /p:PublishSingleFile=true /p:EnableCompressionInSingleFile=true /p:DebugType=None /p:DebugSymbols=false --output ./publish/${{ matrix.runtime }}

      - name: Zip published folder
        run: |
          cd ./publish
          zip -r ${{ matrix.runtime }}.zip ./${{ matrix.runtime }}

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.runtime }}
          path: ./publish/${{ matrix.runtime }}.zip
          retention-days: 1

  release:
    if: github.event.pull_request.merged == true
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Download zipped artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Compute next release version (0.0.x)
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const semverLike = releases
              .map(r => r.tag_name)
              .filter(tag => /^0\.0\.\d+$/.test(tag));

            if (semverLike.length === 0) {
              core.setOutput('version', '0.0.1');
              return;
            }

            const maxPatch = Math.max(...semverLike.map(tag => Number(tag.split('.')[2])));
            core.setOutput('version', `0.0.${maxPatch + 1}`);

      - name: Create GitHub Release and upload zip assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            ./artifacts/**/*.zip
