name: Master PR Merged Publish

on:
  pull_request:
    branches:
      - master
    types:
      - closed

permissions:
  contents: write

jobs:
  version:
    if: github.event.pull_request.merged == true
    name: Compute release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Compute next release version (0.0.x)
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const semverLike = releases
              .map(r => r.tag_name)
              .filter(tag => /^0\.0\.\d+$/.test(tag));

            if (semverLike.length === 0) {
              core.setOutput('version', '0.0.1');
              return;
            }

            const maxPatch = Math.max(...semverLike.map(tag => Number(tag.split('.')[2])));
            core.setOutput('version', `0.0.${maxPatch + 1}`);

  publish:
    if: github.event.pull_request.merged == true
    name: Publish (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            platform: windows
            arch: x64
          - runtime: linux-x64
            platform: linux
            arch: x64
          - runtime: osx-x64
            platform: macos
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/SABepInExManager.csproj

      - name: Publish
        run: dotnet publish ./src/SABepInExManager.csproj -c Release -r ${{ matrix.runtime }} --self-contained true /p:PublishSingleFile=true /p:EnableCompressionInSingleFile=true /p:DebugType=None /p:DebugSymbols=false --output ./publish/${{ matrix.runtime }}

      - name: Zip published folder
        run: |
          cd ./publish
          zip -r SABepInExManager-${{ matrix.platform }}-${{ matrix.arch }}-${{ needs.version.outputs.version }}.zip ./${{ matrix.runtime }}

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.runtime }}
          path: ./publish/SABepInExManager-${{ matrix.platform }}-${{ matrix.arch }}-${{ needs.version.outputs.version }}.zip
          retention-days: 1

  release:
    if: github.event.pull_request.merged == true
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - publish

    steps:
      - name: Download zipped artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release and upload zip assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            ./artifacts/**/*.zip
