name: Master PR Merged Publish

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write

jobs:
  build:
    if: github.event.action != 'closed'
    name: Build on PR opened/updated
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/SABepInExManager/SABepInExManager.csproj

      - name: Build solution
        run: dotnet build ./SABepInExManager.slnx -c Release --no-restore

  publish:
    if: github.event.pull_request.merged == true
    name: Publish (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [win-x64, linux-x64, osx-x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/SABepInExManager/SABepInExManager.csproj

      - name: Prepare BepInEx core references for patcher build
        run: |
          cp -R ./third_party/BepInEx ./temp-bepinex

      - name: Build AutoUpdater patcher files
        run: dotnet build ./src/SABepInExManager.AutoUpdater/SABepInExManager.AutoUpdater.csproj -c Release /p:DebugType=None /p:DebugSymbols=false /p:BepInExDir="${{ github.workspace }}/temp-bepinex/BepInEx/core"

      - name: Stage patchers folder for publish
        run: |
          mkdir -p ./patchers/SABepInExManager_AutoUpdater
          cp -R ./src/SABepInExManager.AutoUpdater/bin/Release/net472/. ./patchers/SABepInExManager_AutoUpdater/

      - name: Publish
        run: dotnet publish ./src/SABepInExManager/SABepInExManager.csproj -c Release -r ${{ matrix.runtime }} --self-contained true /p:PublishSingleFile=true /p:EnableCompressionInSingleFile=true /p:DebugType=None /p:DebugSymbols=false --output ./publish/${{ matrix.runtime }}

      - name: Zip published folder
        run: |
          cd ./publish
          zip -r ${{ matrix.runtime }}.zip ./${{ matrix.runtime }}

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.runtime }}
          path: ./publish/${{ matrix.runtime }}.zip
          retention-days: 1

  release:
    if: github.event.pull_request.merged == true
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Download zipped artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Compute next release version (SemVer + labels)
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const labels = (context.payload.pull_request?.labels ?? []).map(l => l.name);

            const hasMajor = labels.includes('release:major');
            const hasMinor = labels.includes('release:minor');
            const hasPatch = labels.includes('release:patch');

            const selected = [hasMajor, hasMinor, hasPatch].filter(Boolean).length;
            if (selected > 1) {
              core.setFailed('Only one label is allowed among release:major, release:minor, release:patch.');
              return;
            }

            let bump = 'patch';
            if (hasMajor) bump = 'major';
            else if (hasMinor) bump = 'minor';

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const semverLike = releases
              .map(r => r.tag_name)
              .filter(tag => /^\d+\.\d+\.\d+$/.test(tag))
              .map(tag => {
                const [major, minor, patch] = tag.split('.').map(Number);
                return { tag, major, minor, patch };
              })
              .sort((a, b) => {
                if (a.major !== b.major) return b.major - a.major;
                if (a.minor !== b.minor) return b.minor - a.minor;
                return b.patch - a.patch;
              });

            if (semverLike.length === 0) {
              core.setOutput('version', '0.1.0');
              core.setOutput('bump', bump);
              return;
            }

            const latest = semverLike[0];
            let nextVersion = '';

            if (bump === 'major') {
              nextVersion = `${latest.major + 1}.0.0`;
            } else if (bump === 'minor') {
              nextVersion = `${latest.major}.${latest.minor + 1}.0`;
            } else {
              nextVersion = `${latest.major}.${latest.minor}.${latest.patch + 1}`;
            }

            core.setOutput('version', nextVersion);
            core.setOutput('bump', bump);

      - name: Create GitHub Release and upload zip assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            ./artifacts/**/*.zip
