name: PR Dotnet Test Check

on:
  pull_request:
    branches:
      - master
      - canary
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  test:
    name: Test on PR to master/canary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore solution dependencies
        run: dotnet restore ./SABepInExManager.slnx

      - name: Run tests
        run: dotnet test ./SABepInExManager.slnx --configuration Release --no-restore
